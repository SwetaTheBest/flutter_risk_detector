name: flutter_risk_detector
description: >-
  A Flutter debugging toolkit that detects RenderFlex overflows, rebuild storms,
  async risks, memory leaks, jank, and lint issues at runtime and via static analysis.
version: 1.0.0
homepage: https://github.com/SwetaTheBest/flutter_risk_detector
repository: https://github.com/SwetaTheBest/flutter_risk_detector
issue_tracker: https://github.com/SwetaTheBest/flutter_risk_detector/issues
documentation: https://pub.dev/documentation/flutter_risk_detector/latest/
topics:
  - flutter
  - debugging
  - diagnostics
  - performance
  - lint
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.0.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
